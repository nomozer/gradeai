[pytest]
# Tests live in backend/tests/ and import bare names (e.g. `from grading.scoring
# import …`), matching how uvicorn runs the app with cwd=backend/. Adding the
# backend dir to pythonpath here keeps test imports identical to runtime
# imports — no `backend.` prefix anywhere.
testpaths = tests
pythonpath = .
addopts = -ra --strict-markers
