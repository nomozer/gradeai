<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle — warm parchment -->
  <circle cx="32" cy="32" r="30" fill="#F7F5F0" stroke="#3B4F8A" stroke-width="2.5"/>
  <!-- Stylised italic "M" — academic serif, deep indigo -->
  <text
    x="32" y="45"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="600"
    font-style="italic"
    font-size="38"
    fill="#3B4F8A"
    letter-spacing="-1"
  >M</text>
  <!-- Subtle reflection line beneath the M -->
  <line x1="18" y1="50" x2="46" y2="50" stroke="#3B4F8A" stroke-width="1.5" opacity="0.25"/>
</svg>
