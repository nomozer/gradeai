# Render Blueprint — backend (FastAPI) for GradeAI / HITL Mirror.
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
# Render reads this file and provisions the service.
#
# Plan choice: `starter` (~$7/mo) + the persistent disk below is the OPTIMAL
# config and the default here, because the whole HITL thesis is "teacher
# feedback becomes retrievable lessons". On the FREE tier there is NO disk and
# the service sleeps after ~15 min idle, which RESETS the lessons corpus
# (SQLite + ChromaDB) on every restart — defeating that feature. For a
# throwaway demo only, set `plan: free` and delete the `disk:` block.

services:
  - type: web
    name: gradeai-backend
    runtime: python
    rootDir: backend
    # FREE tier — no credit card required. Trade-off: NO persistent disk (the
    # lessons corpus + login accounts in SQLite/ChromaDB RESET on every restart)
    # and the service sleeps after ~15 min idle. FOR PRODUCTION/thesis defense:
    # set `plan: starter` and UNCOMMENT the `disk:` block below (needs a card).
    plan: free
    buildCommand: pip install -r requirements.txt
    # Single worker: the in-process singletons (MemoryManager, Chroma client,
    # file-part LRU cache) are per-process and must not be duplicated/raced.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    # disk:                       # ← uncomment for production (needs a paid plan)
    #   name: gradeai-data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Disable the heartbeat watchdog. Without this the backend self-exits
      # ~90s after the last browser ping (it is a dev-only auto-shutdown).
      - key: DEV_MODE
        value: "1"
      # The backend's own public hostname (TrustedHostMiddleware rejects others
      # with HTTP 400). UPDATE if Render assigns a different subdomain or you
      # attach a custom domain.
      - key: ALLOWED_HOSTS
        value: gradeai-backend-xag2.onrender.com
      # Your Vercel site URL(s), comma-separated, no trailing slash. Drives
      # both CORS and the CSRF origin check (the Vercel /api proxy forwards the
      # browser's Origin = your Vercel domain). UPDATE to your real Vercel URL.
      - key: CORS_ORIGINS
        value: https://gradeai.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://gradeai.vercel.app
      # Login system. The admin account is seeded from these on first startup
      # (idempotent — only created if missing, so changing the admin password
      # later won't be reset on redeploy). The admin then creates teacher
      # accounts from the in-app "Quản lý TK" page. Secrets — set real values
      # in the Render dashboard (Environment tab); `sync: false` prompts for them.
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Auth gate is ON by default. Set AUTH_ENABLED=0 ONLY for a throwaway
      # fully-open demo (no login at all). Leave unset in production.
      # - key: AUTH_ENABLED
      #   value: "1"
      # Secret — set the real value in the Render dashboard, never in git.
      - key: GOOGLE_API_KEY
        sync: false
      # Optional: pin a Gemini model. Leave unset to use the built-in fallback
      # chain (gemini-3-flash-preview → gemini-2.5-flash).
      - key: GEMINI_MODEL
        sync: false
